<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리뷰 작성/수정</title>
</head>
<body>
    <h1>{% if review %}리뷰 수정{% else %}리뷰 작성{% endif%}</h1>
    <form method="POST">
        {% csrf_token %}

        <div>
            <label>영화 제목</label>
            <input type="text" name="title" value="{{ review.title }}">
        </div>
        <div>
            <label>개봉 년도</label>
            <input type="number" name="release_year" value="{{ review.release_year }}">
        </div>
        <div>
            <label>감독</label>
            <input type="text" name="director" value="{{ review.director }}">
        </div>
        <div>
            <label>주연</label>
            <input type="text" name="actor" value="{{ review.actor }}">
        </div>
        <div>
            <label>장르</label>
            <select name="genre">
                <option value="action" {% if review.genre == "action" %}selected{% endif %}>액션</option>
                <option value="thriller" {% if review.genre == "thriller" %}selected{% endif %}>스릴러</option>
                <option value="romance" {% if review.genre == "romance" %}selected{% endif %}>로맨스</option>
                <option value="comedy" {% if review.genre == "comedy" %}selected{% endif %}>코미디</option>
                <option value="sf" {% if review.genre == "sf" %}selected{% endif %}>공상과학</option>
                <option value="horror" {% if review.genre == "horror" %}selected{% endif %}>호러</option>
                <option value="drama" {% if review.genre == "drama" %}selected{% endif %}>드라마</option>
                <option value="animation" {% if review.genre == "animation" %}selected{% endif %}>애니메이션</option>
            </select>
        </div>
        <div>
            <label>별점</label>
            <input type="number" step="0.5" name="rating" value="{{ review.rating }}">
        </div>
        <div>
            <label>러닝타임</label>
            <input type="number" name="running_time" value="{{ review.running_time }}">
        </div>
        <div>
            <label>리뷰 내용</label>
            <textarea name="content">{{ review.content }}</textarea>
        </div>
        <button type="submit">Save</button>
    </form>

</body>
</html>
