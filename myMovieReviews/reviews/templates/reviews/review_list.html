{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리뷰 리스트</title>
    <link rel="stylesheet" href="{% static 'reviews/style.css' %}">
</head>
<body>
    <div class="page">
        <header class="header">
                <h1>My movie reviews</h1>
                <a href="{% url 'reviews:review_create' %}" class="button">리뷰 작성</a>
        </header>
        <main class="review-list">
            {% for review in reviews %}
            <article class="review-card">
                <h2 class="review-title">
                    <a href="{% url 'reviews:review_detail' review.pk %}">{{review.title}}</a>
                </h2>
                <p>개봉 년도: {{review.release_year}}</p>
                <p>장르: {{review.genre}}</p>
                <p>별점: {{review.rating}}</p>
            </article>
            {% endfor %}
        </main>
    </div>
</body>
</html>
