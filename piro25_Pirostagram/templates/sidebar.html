{% load static %}
<aside class="sidebar">
    <div class="logo">Pirostagram</div>
    <nav>
        <a href="{% url 'posts:feed' %}">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-house-icon lucide-house">
                <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/>
                <path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            </svg>홈</a>
        
        <!-- 게시글 검색 -->
        <form method="get" action="{% url 'posts:search' %}">
            <div>
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search-icon lucide-search">
                    <path d="m21 21-4.34-4.34"/>
                    <circle cx="11" cy="11" r="8"/>
                </svg> 게시글 검색
            </div>
            <input type="text" name="q" placeholder="게시글 내용">
            <button type="submit">검색</button>
        </form>

        <!-- 유저 검색 (사이드바 안에서 바로 검색) -->
        <form method="get" action="{% url 'accounts:search' %}">
            <div>
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search-icon lucide-search">
                    <path d="m21 21-4.34-4.34"/>
                    <circle cx="11" cy="11" r="8"/>
                </svg>유저 검색
            </div>
            <input type="text" name="q" placeholder="아이디 또는 이름">
            <button type="submit">검색</button>
        </form>

        <a href="{% url 'posts:feed' %}" onclick="var m=document.getElementById('post-modal'); if(m){m.classList.remove('hidden'); return false;}">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square-plus-icon lucide-square-plus">
                <rect width="18" height="18" x="3" y="3" rx="2"/>
                <path d="M8 12h8"/>
                <path d="M12 8v8"/>
            </svg>게시글 만들기
        </a>
        <a href="{% url 'accounts:profile' request.user.username %}">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-circle-user-round-icon lucide-circle-user-round">
                <path d="M17.925 20.056a6 6 0 0 0-11.851.001"/>
                <circle cx="12" cy="11" r="4"/>
                <circle cx="12" cy="12" r="10"/>
            </svg>프로필
        </a>
        <a href="{% url 'accounts:logout' %}">↩ 로그아웃</a>
    </nav>
</aside>
